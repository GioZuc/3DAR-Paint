plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.ar3d_paint"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.example.ar3d_paint"
        minSdkVersion 24
        targetSdkVersion flutter.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }

    sourceSets {
        main {
            java.srcDirs += [
                'C:/Users/torre/OneDrive/Documenti/arcore-android-sdk/samples/hello_ar_kotlin/app/src/main/java/com/google/ar/core/examples/java'
            ]
            assets.srcDirs += [
                'C:/Users/torre/OneDrive/Documenti/arcore-android-sdk/samples/hello_ar_kotlin/app/src/main/assets'
            ]
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"
    implementation 'com.google.ar:core:1.41.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.lifecycle:lifecycle-common-java8:2.6.2'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'de.javagl:obj:0.3.0'
}